<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InventApp — Gestión de Inventario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="/favicon.png" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">Invent<em>App</em></span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="productos">Productos</button>
      </nav>
      <button class="btn-primary" id="btnNuevoProducto">+ Nuevo Producto</button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- DASHBOARD VIEW -->
    <section class="view active" id="view-dashboard">
      <div class="section-header">
        <h1>Panel de Control</h1>
        <p class="subtitle">Resumen de tu inventario en tiempo real</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Productos</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-badge neutral">registros</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Valor del Inventario</div>
          <div class="stat-value" id="stat-valor">—</div>
          <div class="stat-badge success">S/ total</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Stock Bajo (&le;5)</div>
          <div class="stat-value warning" id="stat-bajo">—</div>
          <div class="stat-badge warning">atención</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sin Stock</div>
          <div class="stat-value danger" id="stat-sin">—</div>
          <div class="stat-badge danger">urgente</div>
        </div>
      </div>

      <div class="recent-section">
        <h2>Productos con Stock Crítico</h2>
        <div id="tabla-criticos" class="tabla-wrap"></div>
      </div>
    </section>

    <!-- PRODUCTOS VIEW -->
    <section class="view" id="view-productos">
      <div class="section-header">
        <h1>Inventario</h1>
        <p class="subtitle">Gestiona todos tus productos</p>
      </div>

      <div class="toolbar">
        <input type="text" id="buscarInput" class="input-search" placeholder="Buscar producto..."/>
        <select id="categoriaFiltro" class="input-select">
          <option value="">Todas las categorías</option>
        </select>
        <select id="ordenFiltro" class="input-select">
          <option value="">Más reciente</option>
          <option value="nombre">Nombre A-Z</option>
          <option value="precio">Precio</option>
          <option value="stock">Stock</option>
        </select>
        <button class="btn-secondary" id="btnBuscar">Filtrar</button>
      </div>

      <div id="tabla-productos" class="tabla-wrap"></div>
    </section>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nuevo Producto</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="formProducto" class="modal-form">
        <input type="hidden" id="productoId"/>

        <div class="form-row">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="nombre" required maxlength="100" placeholder="Ej: Laptop Dell XPS"/>
          </div>
          <div class="form-group">
            <label>Categoría *</label>
            <input type="text" id="categoria" required placeholder="Ej: Electrónica"/>
          </div>
        </div>

        <div class="form-group">
          <label>Descripción</label>
          <textarea id="descripcion" rows="2" maxlength="500" placeholder="Descripción opcional..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Precio (S/) *</label>
            <input type="number" id="precio" required min="0" step="0.01" placeholder="0.00"/>
          </div>
          <div class="form-group">
            <label>Stock *</label>
            <input type="number" id="stock" required min="0" placeholder="0"/>
          </div>
          <div class="form-group">
            <label>Unidad</label>
            <input type="text" id="unidad" placeholder="unidad, kg, lt..." value="unidad"/>
          </div>
        </div>

        <div id="formError" class="form-error hidden"></div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
          <button type="submit" class="btn-primary" id="btnGuardar">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
